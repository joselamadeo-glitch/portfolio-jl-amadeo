    const { useState, useEffect, useRef } = React;



function useInView(ref) {
  const [visible, setVisible] = useState(false);
  useEffect(() => {
    const obs = new IntersectionObserver(([e]) => { if (e.isIntersecting) setVisible(true); }, { threshold: 0.12 });
    if (ref.current) obs.observe(ref.current);
    return () => obs.disconnect();
  }, [ref]);
  return visible;
}

function FadeIn({ children, delay = 0, style = {} }) {
  const ref = useRef(null);
  const vis = useInView(ref);
  return (
    <div ref={ref} style={{
      opacity: vis ? 1 : 0, transform: vis ? "translateY(0)" : "translateY(28px)",
      transition: `opacity .7s ease ${delay}s, transform .7s ease ${delay}s`, ...style,
    }}>{children}</div>
  );
}

function DashboardGallery() {
  const [current, setCurrent] = useState(0);
  const [zoomed, setZoomed] = useState(false);
  const total = DASHBOARD_IMAGES.length;
  const img = DASHBOARD_IMAGES[current];

  return (
    <div>
      {/* Main image */}
      <div style={{
        position: "relative", borderRadius: 12, overflow: "hidden",
        boxShadow: "0 4px 24px rgba(27,42,74,.12)", marginBottom: 12,
        cursor: "pointer", border: `1px solid ${C.border}`,
      }} onClick={() => setZoomed(true)}>
        <img src={img.src} alt={img.title} style={{ width: "100%", display: "block", borderRadius: 12 }} />
        <div style={{
          position: "absolute", bottom: 0, left: 0, right: 0,
          background: "linear-gradient(transparent, rgba(27,42,74,.85))",
          padding: "40px 20px 16px",
        }}>
          <div style={{ fontSize: 15, fontWeight: 800, color: "#fff" }}>{img.title}</div>
          <div style={{ fontSize: 11, color: "rgba(255,255,255,.7)", marginTop: 3, lineHeight: 1.5 }}>{img.desc}</div>
        </div>
        <div style={{
          position: "absolute", top: 10, right: 12,
          background: "rgba(27,42,74,.7)", borderRadius: 20,
          padding: "3px 10px", fontSize: 10, color: "#fff", fontWeight: 600,
        }}>{current + 1} / {total}</div>
      </div>

      {/* Thumbnails + navigation */}
      <div style={{ display: "flex", gap: 8, alignItems: "center", justifyContent: "center" }}>
        <button onClick={() => setCurrent(p => (p - 1 + total) % total)} style={{
          width: 30, height: 30, borderRadius: "50%", border: `1px solid ${C.border}`,
          background: C.card, cursor: "pointer", fontSize: 14, display: "flex",
          alignItems: "center", justifyContent: "center", flexShrink: 0,
        }}>‹</button>
        <div style={{ display: "flex", gap: 6, overflow: "auto", padding: "4px 0" }}>
          {DASHBOARD_IMAGES.map((d, i) => (
            <div key={i} onClick={() => setCurrent(i)} style={{
              width: 72, height: 44, borderRadius: 6, overflow: "hidden", cursor: "pointer",
              border: current === i ? `2px solid ${C.teal}` : `1px solid ${C.border}`,
              opacity: current === i ? 1 : 0.6, transition: "all .2s", flexShrink: 0,
            }}>
              <img src={d.src} alt={d.title} style={{ width: "100%", height: "100%", objectFit: "cover" }} />
            </div>
          ))}
        </div>
        <button onClick={() => setCurrent(p => (p + 1) % total)} style={{
          width: 30, height: 30, borderRadius: "50%", border: `1px solid ${C.border}`,
          background: C.card, cursor: "pointer", fontSize: 14, display: "flex",
          alignItems: "center", justifyContent: "center", flexShrink: 0,
        }}>›</button>
      </div>

      {/* Zoom modal */}
      {zoomed && (
        <div onClick={() => setZoomed(false)} style={{
          position: "fixed", top: 0, left: 0, right: 0, bottom: 0,
          background: "rgba(0,0,0,.85)", zIndex: 9999,
          display: "flex", alignItems: "center", justifyContent: "center",
          cursor: "zoom-out", padding: 20,
        }}>
          <img src={img.src} alt={img.title} style={{ maxWidth: "95%", maxHeight: "90vh", borderRadius: 8 }} />
        </div>
      )}
    </div>
  );
}
